name = "nerv-traffic-push"
main = "worker.js"
compatibility_date = "2024-11-01"

# KV: 購読情報と渋滞状態の保存先。
# 事前に `wrangler kv namespace create SUBS` を実行し、出力された id を下に貼る。
[[kv_namespaces]]
binding = "SUBS"
id = "<YOUR_KV_NAMESPACE_ID>"

# ADMIN_TOKEN はシークレットとして設定する (toml には書かない):
#   wrangler secret put ADMIN_TOKEN
