name: Fetch @mlit_himeji tweets

on:
  schedule:
    # GitHub Pages の build limit (10/hour) を超過しないよう 10分間隔
    - cron: '*/10 * * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: fetch-tweets
  cancel-in-progress: false

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Fetch and parse
        run: python scripts/fetch_tweets.py

      - name: Commit if changed
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add tweets.json
          if git diff --cached --quiet; then
            echo "No changes."
            exit 0
          fi
          git commit -m "chore: update tweets.json [skip ci]"
          # 競合対策: push 失敗時は最新をrebaseして再試行
          for i in 1 2 3; do
            if git push; then
              echo "Pushed on attempt $i"
              exit 0
            fi
            echo "Push failed (attempt $i). Rebasing and retrying..."
            git pull --rebase origin main || true
          done
          echo "ERROR: push failed after 3 attempts"
          exit 1
