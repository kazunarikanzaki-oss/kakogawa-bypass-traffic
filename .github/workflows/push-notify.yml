name: Push notify (congestion)

on:
  schedule:
    # 5分毎に最新ツイートを取得して渋滞/解消を判定しプッシュ送信。
    # リポジトリへのコミットはせず(状態はWorkerのKVに保存) Pagesビルドを増やさない。
    - cron: '*/5 * * * *'
  workflow_dispatch:

concurrency:
  group: push-notify
  cancel-in-progress: false

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # 最新ツイートを取得 (コミットはしない。判定用にローカル生成するだけ)
      - name: Fetch latest tweets
        run: python scripts/fetch_tweets.py

      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install deps
        working-directory: scripts
        run: npm install --no-audit --no-fund

      - name: Detect transition and send push
        working-directory: scripts
        # 非機密(WORKER_URL/VAPID公開鍵/subject)は push.config.json から読み込む。
        # 機密の2つだけ GitHub Secrets で渡す。
        env:
          ADMIN_TOKEN: ${{ secrets.PUSH_ADMIN_TOKEN }}
          VAPID_PRIVATE_KEY: ${{ secrets.VAPID_PRIVATE_KEY }}
        run: node push_notify.js
