name: Push notify (congestion)

on:
  schedule:
    # 5分毎に最新ツイートを取得して渋滞/解消を判定しプッシュ送信。
    # リポジトリへのコミットはせず(状態はWorkerのKVに保存) Pagesビルドを増やさない。
    - cron: '*/5 * * * *'
  workflow_dispatch:

concurrency:
  group: push-notify
  cancel-in-progress: false

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # 最新ツイートを取得 (コミットはしない。判定用にローカル生成するだけ)
      - name: Fetch latest tweets
        run: python scripts/fetch_tweets.py

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install deps
        working-directory: scripts
        run: npm install --no-audit --no-fund

      - name: Detect transition and send push
        working-directory: scripts
        env:
          WORKER_URL: ${{ secrets.PUSH_WORKER_URL }}
          ADMIN_TOKEN: ${{ secrets.PUSH_ADMIN_TOKEN }}
          VAPID_PUBLIC_KEY: ${{ secrets.VAPID_PUBLIC_KEY }}
          VAPID_PRIVATE_KEY: ${{ secrets.VAPID_PRIVATE_KEY }}
          VAPID_SUBJECT: ${{ secrets.VAPID_SUBJECT }}
        run: node push_notify.js
